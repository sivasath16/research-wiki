events {
    worker_connections 1024;
}

http {
    # Rate limiting — 10 req/s per IP for API
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=10r/s;
    # WebSocket concurrent connection cap per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend {
        server backend:8001;
    }

    upstream frontend {
        server frontend:3000;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 1m;

        # ── Security headers ─────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:"
            always;

        # ── API routes → FastAPI backend ─────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;

            # Required for SSE
            proxy_buffering off;
            proxy_cache     off;
        }

        # ── WebSocket chat → FastAPI backend ─────────────────────────
        location /ws/ {
            limit_conn ws_conn 5;         # max 5 concurrent WS connections per IP
            limit_req  zone=api burst=5 nodelay;  # throttle the handshake

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;  # heartbeat every 25s keeps this alive
            proxy_send_timeout 3600s;
        }

        # ── Frontend ─────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
        }
    }
}
