version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchwiki
      POSTGRES_USER: ${POSTGRES_USER:-rwuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rwpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rwuser} -d researchwiki"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      gunicorn api.main:app
      -k uvicorn.workers.UvicornWorker
      -w 4
      --bind 0.0.0.0:8001
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://rwuser:rwpass@postgres:5432/researchwiki}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-https://localhost/auth/callback}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://localhost}
      - SECRET_KEY=${SECRET_KEY}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Run two separate worker pools — one per queue
    command: >
      celery -A worker.celery_app worker
      --queues=ingest,wiki
      --concurrency=4
      --loglevel=info
      --max-tasks-per-child=50
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://rwuser:rwpass@postgres:5432/researchwiki}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FERNET_KEY=${FERNET_KEY}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A worker.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
      --url_prefix=flower
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://localhost}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://localhost}
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  model_cache:
